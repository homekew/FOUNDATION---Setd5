<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Meeting Agenda | SETD5 Syndrome Foundation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal:       #2F5361;
  --teal-dark:  #1e3a45;
  --teal-light: #d5ddde;
  --coral:      #c96a38;
  --coral-light:#eeebe7;
  --gold:       #D8AB67;
  --gold-light: #F2F2F0;
  --white:      #ffffff;
  --cream:      #F7F3EE;
  --text:       #1A3340;
  --text-mid:   #4a6b78;
  --text-light: #7a9bab;
  --border:     #dde8ec;
  --shadow-sm:  0 1px 3px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.05);
  --shadow-md:  0 2px 6px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.07);
}
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  line-height: 1.68;
  font-size: 16px;
}
h1, h2, h3 {
  font-family: 'Source Serif 4', serif;
  font-weight: 600;
  color: var(--teal);
  line-height: 1.2;
}
.subhead {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600;
  color: var(--coral);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  font-size: 0.72rem;
  display: block;
  margin-bottom: 10px;
}
.page {
  max-width: 760px;
  margin: 0 auto;
  padding: 48px 32px 80px;
}

/* ── Toolbar ── */
.toolbar {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-bottom: 32px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: 8px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}
.btn-teal { background: var(--teal); color: var(--white); }
.btn-teal:hover { background: var(--teal-dark); }
.btn-outline { background: var(--white); color: var(--teal); border: 1.5px solid var(--teal-light); }
.btn-outline:hover { border-color: var(--teal); }

/* ── Header ── */
.doc-header {
  border-bottom: 2px solid var(--teal-light);
  padding-bottom: 24px;
  margin-bottom: 32px;
}
.doc-header h1 { font-size: 1.75rem; margin-bottom: 6px; }
.doc-header p { color: var(--text-mid); font-size: 0.88rem; margin: 0; }

/* ── Meeting details ── */
.meeting-details {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 36px;
  box-shadow: var(--shadow-sm);
}
.detail-item {
  padding: 14px 20px;
  border-right: 1px solid var(--border);
}
.detail-item:last-child { border-right: none; }
.detail-item label {
  display: block;
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--teal);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.detail-item input {
  width: 100%;
  border: none;
  background: transparent;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  outline: none;
}
.detail-item input::placeholder { color: var(--text-light); font-style: italic; }

/* ── Notice box ── */
.notice {
  background: var(--white);
  border: 1px solid rgba(216,171,103,0.4);
  border-left: 4px solid var(--gold);
  border-radius: 0 8px 8px 0;
  padding: 14px 18px;
  margin-bottom: 32px;
  font-size: 0.86rem;
  color: var(--text-mid);
}
.notice strong { color: var(--text); }
.notice input {
  background: transparent;
  border: none;
  border-bottom: 1px dashed var(--teal-light);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.86rem;
  color: var(--text);
  outline: none;
  min-width: 240px;
  padding: 0 4px;
}
.notice input::placeholder { color: var(--text-light); font-style: italic; }

/* ── Agenda items ── */
.agenda-list { list-style: none; padding: 0; }
.agenda-item {
  display: flex;
  gap: 16px;
  padding: 18px 22px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  align-items: flex-start;
}
.agenda-item:hover { box-shadow: var(--shadow-md); }

.item-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--teal);
  color: var(--white);
  font-size: 0.75rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.item-body { flex: 1; min-width: 0; }
.item-title {
  font-weight: 700;
  color: var(--text);
  font-size: 0.95rem;
  margin-bottom: 4px;
}
.item-title input {
  border: none;
  background: transparent;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text);
  width: 100%;
  outline: none;
}
.item-title input::placeholder { color: var(--text-light); font-weight: 400; font-style: italic; }
.item-desc {
  font-size: 0.86rem;
  color: var(--text-mid);
  line-height: 1.6;
}
.item-desc textarea {
  width: 100%;
  border: none;
  background: transparent;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.86rem;
  color: var(--text-mid);
  line-height: 1.6;
  resize: none;
  outline: none;
  min-height: 24px;
  overflow: hidden;
}
.item-desc textarea::placeholder { color: var(--text-light); font-style: italic; }
.item-time {
  font-size: 0.75rem;
  color: var(--text-light);
  font-style: italic;
  white-space: nowrap;
  padding-top: 4px;
  flex-shrink: 0;
}
.item-time input {
  border: none;
  background: transparent;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.75rem;
  color: var(--text-light);
  font-style: italic;
  text-align: right;
  width: 60px;
  outline: none;
}
.item-time input::placeholder { color: var(--teal-light); }

/* ── Add item button ── */
.add-item-btn {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 1.5px dashed var(--teal-light);
  border-radius: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.84rem;
  color: var(--text-light);
  cursor: pointer;
  margin-top: 4px;
  transition: all 0.15s;
}
.add-item-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--white); }

/* ── Footer note ── */
.agenda-footer {
  margin-top: 36px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 16px;
  font-size: 0.8rem;
  color: var(--text-light);
}
.footer-note input {
  border: none;
  background: transparent;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.8rem;
  color: var(--text-light);
  outline: none;
  min-width: 260px;
}
.footer-note input::placeholder { color: var(--teal-light); font-style: italic; }

/* ── Print ── */
@media print {
  body { background: white; font-size: 13px; }
  .page { padding: 20px; max-width: 100%; }
  .toolbar { display: none; }
  .agenda-item { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
  .meeting-details { box-shadow: none; border: 1px solid #ccc; }
  .add-item-btn { display: none; }
  input, textarea { -webkit-print-color-adjust: exact; }
}
@media (max-width: 580px) {
  .meeting-details { grid-template-columns: 1fr; }
  .detail-item { border-right: none; border-bottom: 1px solid var(--border); }
  .detail-item:last-child { border-bottom: none; }
  .page { padding: 24px 16px 60px; }
}
</style>
</head>
<body>
<div class="page">

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn btn-outline" onclick="window.print()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="3" y="1" width="10" height="5" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="6" width="14" height="7" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="4" y="10" width="8" height="5" rx="0.5" stroke="currentColor" stroke-width="1.4"/></svg>
      Print / Save PDF
    </button>
    <button class="btn btn-teal" onclick="clearAgenda()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 1 1 12 0A6 6 0 0 1 2 8z" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      New Agenda
    </button>
  </div>

  <!-- Header -->
  <div class="doc-header">
    <span class="subhead">SETD5 Syndrome Foundation, Inc.</span>
    <h1>Board of Directors Meeting Agenda</h1>
    <p>Distributed in advance — please review before the meeting</p>
  </div>

  <!-- Meeting details -->
  <div class="meeting-details">
    <div class="detail-item">
      <label>Date</label>
      <input type="text" placeholder="e.g. April 15, 2026">
    </div>
    <div class="detail-item">
      <label>Time</label>
      <input type="text" placeholder="e.g. 6:00 PM ET">
    </div>
    <div class="detail-item">
      <label>Location / Platform</label>
      <input type="text" placeholder="e.g. Zoom / In person">
    </div>
  </div>

  <!-- Pre-read notice -->
  <div class="notice">
    <strong>Materials to review before this meeting:</strong>&nbsp;
    <input type="text" placeholder="e.g. Draft budget, committee reports, prior minutes — linked in the board portal">
  </div>

  <!-- Agenda items -->
  <ol class="agenda-list" id="agenda-list">

    <li class="agenda-item">
      <div class="item-num">1</div>
      <div class="item-body">
        <div class="item-title"><input type="text" value="Call to Order &amp; Confirmation of Quorum"></div>
        <div class="item-desc"><textarea rows="1" placeholder="Supporting notes..." oninput="autoResize(this)"></textarea></div>
      </div>
      <div class="item-time"><input type="text" placeholder="5 min"></div>
    </li>

    <li class="agenda-item">
      <div class="item-num">2</div>
      <div class="item-body">
        <div class="item-title"><input type="text" value="Approval of Agenda"></div>
        <div class="item-desc"><textarea rows="1" placeholder="Supporting notes..." oninput="autoResize(this)"></textarea></div>
      </div>
      <div class="item-time"><input type="text" placeholder="2 min"></div>
    </li>

    <li class="agenda-item">
      <div class="item-num">3</div>
      <div class="item-body">
        <div class="item-title"><input type="text" value="Approval of Prior Meeting Minutes"></div>
        <div class="item-desc"><textarea rows="1" placeholder="Supporting notes..." oninput="autoResize(this)"></textarea></div>
      </div>
      <div class="item-time"><input type="text" placeholder="5 min"></div>
    </li>

    <li class="agenda-item">
      <div class="item-num">4</div>
      <div class="item-body">
        <div class="item-title"><input type="text" value="Committee Reports"></div>
        <div class="item-desc"><textarea rows="1" placeholder="e.g. Finance, Communications &amp; Technology, Family Outreach, Research" oninput="autoResize(this)"></textarea></div>
      </div>
      <div class="item-time"><input type="text" placeholder="15 min"></div>
    </li>

    <li class="agenda-item">
      <div class="item-num">5</div>
      <div class="item-body">
        <div class="item-title"><input type="text" value="Old Business"></div>
        <div class="item-desc"><textarea rows="1" placeholder="Items carried over from a previous meeting..." oninput="autoResize(this)"></textarea></div>
      </div>
      <div class="item-time"><input type="text" placeholder="10 min"></div>
    </li>

    <li class="agenda-item">
      <div class="item-num">6</div>
      <div class="item-body">
        <div class="item-title"><input type="text" value="New Business"></div>
        <div class="item-desc"><textarea rows="1" placeholder="Topics for discussion and vote..." oninput="autoResize(this)"></textarea></div>
      </div>
      <div class="item-time"><input type="text" placeholder="20 min"></div>
    </li>

    <li class="agenda-item">
      <div class="item-num">7</div>
      <div class="item-body">
        <div class="item-title"><input type="text" value="Other Business &amp; Adjournment"></div>
        <div class="item-desc"><textarea rows="1" placeholder="Open floor, next meeting date..." oninput="autoResize(this)"></textarea></div>
      </div>
      <div class="item-time"><input type="text" placeholder="5 min"></div>
    </li>

  </ol>

  <button class="add-item-btn" onclick="addItem()">+ Add agenda item</button>

  <!-- Footer -->
  <div class="agenda-footer">
    <div class="footer-note">
      Questions before the meeting? Contact:&nbsp;
      <input type="text" placeholder="Chair name and email">
    </div>
    <div style="text-align:right;">
      Prepared by <input type="text" placeholder="Name" style="border:none;background:transparent;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.8rem;color:var(--text-light);outline:none;width:120px;">
    </div>
  </div>

</div>

<script>
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function addItem() {
  const list = document.getElementById('agenda-list');
  const items = list.querySelectorAll('.agenda-item');
  const num = items.length + 1;
  const li = document.createElement('li');
  li.className = 'agenda-item';
  li.innerHTML = `
    <div class="item-num">${num}</div>
    <div class="item-body">
      <div class="item-title"><input type="text" placeholder="Agenda item title"></div>
      <div class="item-desc"><textarea rows="1" placeholder="Supporting notes..." oninput="autoResize(this)"></textarea></div>
    </div>
    <div class="item-time"><input type="text" placeholder="__ min"></div>
  `;
  list.appendChild(li);
  li.querySelector('input').focus();
}

function clearAgenda() {
  if (!confirm('Clear all fields and start a new agenda?')) return;
  document.querySelectorAll('input[type="text"]').forEach(el => {
    if (!el.closest('.agenda-item') || el.closest('.agenda-item').dataset.fixed) return;
    el.value = '';
  });
  document.querySelectorAll('textarea').forEach(el => {
    el.value = '';
    el.style.height = 'auto';
  });
  // Reset meeting detail fields only
  document.querySelectorAll('.meeting-details input, .notice input, .footer-note input').forEach(el => el.value = '');
}
</script>
</body>
</html>
